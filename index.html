<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="JK Tracker">
<title>Jose & Kely Tracker</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;font-size:14px;background:#f5f5f7;color:#1c1c1e;min-height:100vh;padding-bottom:80px}
.header{background:#fff;padding:16px 20px 12px;border-bottom:0.5px solid #e0e0e0;position:sticky;top:0;z-index:100}
.header-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px}
.app-title{font-size:20px;font-weight:700;letter-spacing:-.3px}
.date-lbl{font-size:12px;color:#888}
.profile-bar{display:flex;gap:8px}
.profile-btn{flex:1;padding:9px;border-radius:12px;border:1.5px solid #e0e0e0;background:#fff;font-size:13px;font-weight:600;cursor:pointer;text-align:center;transition:all .15s}
.profile-btn.active-j{border-color:#c4a800;background:rgba(196,168,0,.1);color:#8a7200}
.profile-btn.active-k{border-color:#c4006e;background:rgba(196,0,110,.1);color:#8a004d}
.nav{position:fixed;bottom:0;left:0;right:0;background:#fff;border-top:0.5px solid #e0e0e0;display:flex;padding:8px 0 20px;z-index:100}
.nav-btn{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;border:none;background:transparent;font-size:10px;color:#888;cursor:pointer;padding:6px 0;font-family:inherit}
.nav-btn.active{color:#c4a800}
.nav-btn.active-k{color:#c4006e}
.nav-icon{font-size:22px}
.screen{display:none;padding:16px}
.screen.active{display:block}
.card{background:#fff;border-radius:16px;padding:16px;margin-bottom:12px;box-shadow:0 1px 3px rgba(0,0,0,.06)}
.card-title{font-size:12px;font-weight:600;color:#888;text-transform:uppercase;letter-spacing:.06em;margin-bottom:14px;display:flex;align-items:center;gap:6px}
.stat-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:12px}
.stat{background:#fff;border-radius:14px;padding:14px;box-shadow:0 1px 3px rgba(0,0,0,.06)}
.stat-val{font-size:28px;font-weight:700;line-height:1}
.stat-lbl{font-size:11px;color:#888;margin-top:4px}
.stat-j .stat-val{color:#8a7200}.stat-k .stat-val{color:#8a004d}
.prog-wrap{margin-bottom:12px}
.prog-lbl{display:flex;justify-content:space-between;font-size:12px;color:#888;margin-bottom:5px}
.prog-bar{height:7px;background:#f0f0f0;border-radius:4px;overflow:hidden}
.prog-fill{height:100%;border-radius:4px;transition:width .4s}
.meal-row{display:flex;align-items:center;padding:12px 0;border-bottom:0.5px solid #f0f0f0;cursor:pointer;gap:12px}
.meal-row:last-child{border-bottom:none}
.meal-check{width:26px;height:26px;border-radius:50%;border:1.5px solid #ddd;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all .15s;font-size:14px}
.meal-check.done-j{background:#c4a800;border-color:#c4a800;color:#fff}
.meal-check.done-k{background:#c4006e;border-color:#c4006e;color:#fff}
.meal-info{flex:1}
.meal-name{font-size:14px;font-weight:600}
.meal-desc{font-size:12px;color:#888;margin-top:2px;line-height:1.4}
.meal-time{font-size:12px;color:#bbb;flex-shrink:0}
.water-grid{display:flex;flex-wrap:wrap;gap:6px;margin-top:10px}
.water-glass{width:36px;height:42px;border-radius:8px;border:1.5px solid #e0e0e0;background:#f8f8f8;display:flex;align-items:center;justify-content:center;font-size:18px;cursor:pointer;transition:all .15s}
.water-glass.filled-j{background:rgba(196,168,0,.15);border-color:#c4a800}
.water-glass.filled-k{background:rgba(196,0,110,.1);border-color:#c4006e}
.week-strip{display:flex;gap:6px;margin-bottom:14px;overflow-x:auto;padding-bottom:4px}
.week-strip::-webkit-scrollbar{display:none}
.wday{min-width:40px;flex:1;text-align:center;padding:8px 4px;border-radius:10px;border:1.5px solid #e0e0e0;background:#fff;cursor:pointer}
.wday.today{border-color:#c4a800;background:rgba(196,168,0,.08)}
.wday-name{font-size:9px;color:#888;text-transform:uppercase;letter-spacing:.04em}
.wday-num{font-size:16px;font-weight:600;margin:2px 0}
.wday-dot{width:5px;height:5px;border-radius:50%;background:#e0e0e0;margin:0 auto}
.wday.done-j .wday-dot{background:#c4a800}
.wday.done-k .wday-dot{background:#c4006e}
.ex-row{padding:10px 0;border-bottom:0.5px solid #f0f0f0}
.ex-row:last-child{border-bottom:none}
.ex-name{font-size:14px;font-weight:600}
.ex-meta{display:flex;gap:8px;margin-top:3px;flex-wrap:wrap}
.ex-sets{font-size:12px;font-weight:600;color:#8a7200;background:rgba(196,168,0,.12);padding:2px 8px;border-radius:6px}
.ex-machine{font-size:12px;color:#888}
.big-btn{width:100%;padding:14px;border-radius:14px;border:none;font-size:15px;font-weight:600;cursor:pointer;margin-top:8px;font-family:inherit;transition:all .15s;display:flex;align-items:center;justify-content:center;gap:8px}
.btn-j{background:#c4a800;color:#fff}
.btn-k{background:#c4006e;color:#fff}
.btn-outline{background:#fff;border:1.5px solid #e0e0e0;color:#1c1c1e}
.week-log-row{display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:0.5px solid #f0f0f0;font-size:13px}
.week-log-row:last-child{border-bottom:none}
.badge{font-size:11px;font-weight:600;padding:4px 10px;border-radius:8px}
.badge-done{background:#e8f8f0;color:#1a6e3a}
.badge-today{background:rgba(196,168,0,.15);color:#8a7200}
.badge-rest{background:#f5f5f5;color:#888}
.badge-skip{color:#bbb}
.read-input{width:100%;padding:12px 14px;border:1.5px solid #e0e0e0;border-radius:12px;font-size:14px;background:#fff;color:#1c1c1e;font-family:inherit;margin-top:8px;outline:none}
.read-input:focus{border-color:#c4a800}
.pages-input{width:80px;padding:10px;border:1.5px solid #e0e0e0;border-radius:12px;font-size:16px;font-weight:600;text-align:center;background:#fff;color:#1c1c1e;font-family:inherit;outline:none}
.pages-input:focus{border-color:#c4a800}
.toggle-row{display:flex;align-items:center;justify-content:space-between;padding:12px 0;border-bottom:0.5px solid #f0f0f0}
.toggle-row:last-child{border-bottom:none}
.toggle-wrap{display:flex;flex-direction:column}
.toggle-title{font-size:14px;font-weight:600}
.toggle-sub{font-size:12px;color:#888;margin-top:2px}
.ios-toggle{width:50px;height:30px;border-radius:15px;background:#e0e0e0;position:relative;transition:background .2s;cursor:pointer;flex-shrink:0}
.ios-toggle.on-j{background:#c4a800}
.ios-toggle.on-k{background:#c4006e}
.ios-knob{position:absolute;top:2px;left:2px;width:26px;height:26px;border-radius:50%;background:#fff;box-shadow:0 1px 4px rgba(0,0,0,.2);transition:left .2s}
.ios-toggle.on-j .ios-knob,.ios-toggle.on-k .ios-knob{left:22px}
.read-day-row{display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:0.5px solid #f0f0f0;font-size:13px}
.read-day-row:last-child{border-bottom:none}
.weight-wrap{display:flex;align-items:center;gap:16px;padding:8px 0}
.w-block{flex:1}
.w-label{font-size:12px;color:#888;margin-bottom:4px}
.w-value{font-size:26px;font-weight:700}
.w-value-j{color:#8a7200}.w-value-k{color:#8a004d}
.empty-state{text-align:center;padding:20px;color:#bbb;font-size:13px}
</style>
</head>
<body>

<div class="header">
  <div class="header-top">
    <div class="app-title">JK Tracker</div>
    <div class="date-lbl" id="date-lbl"></div>
  </div>
  <div class="profile-bar">
    <button class="profile-btn active-j" id="pbtn-j" onclick="setProfile('j')">
      Jose<br><span style="font-size:11px;font-weight:400">97.1 → 77 kg</span>
    </button>
    <button class="profile-btn" id="pbtn-k" onclick="setProfile('k')">
      Kely<br><span style="font-size:11px;font-weight:400">76.7 → 68 kg</span>
    </button>
  </div>
</div>

<div id="s-dashboard" class="screen active">
  <div class="stat-grid" id="stat-grid"></div>
  <div class="card">
    <div class="card-title">Weekly progress</div>
    <div id="dash-progress"></div>
  </div>
  <div class="card">
    <div class="card-title">Weight goal</div>
    <div id="weight-card"></div>
  </div>
</div>

<div id="s-today" class="screen">
  <div class="card">
    <div class="card-title">Meals today</div>
    <div id="meal-list"></div>
    <div class="prog-wrap" style="margin-top:12px">
      <div class="prog-lbl"><span>Plan adherence</span><span id="meal-pct">0%</span></div>
      <div class="prog-bar"><div class="prog-fill" id="meal-bar" style="width:0%"></div></div>
    </div>
  </div>
  <div class="card">
    <div class="card-title">Supplements</div>
    <div id="supp-list"></div>
  </div>
  <div class="card">
    <div class="card-title">Water intake</div>
    <div style="display:flex;justify-content:space-between;align-items:center">
      <div style="font-size:12px;color:#888">Tap each glass (250ml)</div>
      <div style="font-size:22px;font-weight:700" id="water-count">0</div>
    </div>
    <div class="water-grid" id="water-grid"></div>
  </div>
</div>

<div id="s-gym" class="screen">
  <div class="week-strip" id="week-strip"></div>
  <div class="card">
    <div class="card-title" id="gym-day-title">Today's workout</div>
    <div id="exercise-list"></div>
    <button class="big-btn btn-j" id="gym-log-btn" onclick="logGymDay()">Mark session as done</button>
  </div>
  <div class="card">
    <div class="card-title">This week</div>
    <div id="week-gym-log"></div>
  </div>
</div>

<div id="s-reading" class="screen">
  <div class="card">
    <div class="card-title">Reading log</div>
    <div class="toggle-row">
      <div class="toggle-wrap">
        <div class="toggle-title">Current book</div>
      </div>
    </div>
    <input class="read-input" id="book-input" placeholder="Book title..." oninput="saveBook()">
    <div class="toggle-row" style="margin-top:8px">
      <div class="toggle-wrap">
        <div class="toggle-title">Pages read today</div>
        <div class="toggle-sub">Any amount counts</div>
      </div>
      <input class="pages-input" id="pages-input" type="number" min="0" value="0">
    </div>
    <div class="toggle-row">
      <div class="toggle-wrap">
        <div class="toggle-title">Read today?</div>
      </div>
      <div class="ios-toggle" id="read-toggle" onclick="toggleRead()"><div class="ios-knob"></div></div>
    </div>
    <button class="big-btn btn-j" id="save-read-btn" onclick="saveReading()" style="margin-top:12px">Save today</button>
  </div>
  <div class="card">
    <div class="card-title">This week</div>
    <div id="reading-week"></div>
    <div class="prog-wrap" style="margin-top:12px">
      <div class="prog-lbl"><span>Days read</span><span id="read-days-lbl">0 / 7</span></div>
      <div class="prog-bar"><div class="prog-fill" id="read-bar" style="width:0%"></div></div>
    </div>
  </div>
</div>

<nav class="nav">
  <button class="nav-btn active" id="nav-dashboard" onclick="showScreen('dashboard',this)">
    <span class="nav-icon">📊</span>Dashboard
  </button>
  <button class="nav-btn" id="nav-today" onclick="showScreen('today',this)">
    <span class="nav-icon">☀️</span>Today
  </button>
  <button class="nav-btn" id="nav-gym" onclick="showScreen('gym',this)">
    <span class="nav-icon">🏋️</span>Gym
  </button>
  <button class="nav-btn" id="nav-reading" onclick="showScreen('reading',this)">
    <span class="nav-icon">📚</span>Reading
  </button>
</nav>

<script>
var profile='j';
var state=JSON.parse(localStorage.getItem('jk_v2')||'null')||{j:{meals:{},gym:{},reading:{},water:{},book:''},k:{meals:{},gym:{},reading:{},water:{},book:''}};
var profiles={j:{name:'Jose',color:'#c4a800',text:'#8a7200',target:77,current:97.1,gymDays:4,water:12},k:{name:'Kely',color:'#c4006e',text:'#8a004d',target:68,current:76.7,gymDays:3,water:10}};
var MEALS=[{id:'breakfast',name:'Breakfast',time:'08:00',desc:'Oats 80g + 3 egg whites + 1 egg + banana + coffee'},{id:'snack1',name:'Mid-morning snack',time:'11:00',desc:'Greek yogurt 0% + 30g nuts + fruit'},{id:'lunch',name:'Lunch',time:'14:00',desc:'Protein + carbs + veggies (from tupper)'},{id:'snack2',name:'Pre-workout snack',time:'17:30',desc:'Whole grain toast + turkey + fruit'},{id:'dinner',name:'Dinner',time:'21:00',desc:'Protein + veggies, no carbs'}];
var SUPPS=[{id:'protein',name:'Protein shake',desc:'30g post-gym or with breakfast'},{id:'creatine',name:'Creatine 3g',desc:'Daily — mix with protein shake'}];
var WO={0:{t:'Sunday — Together',j:[{n:'Bench press',s:'4×10–12',m:'Hammer Strength'},{n:'Barbell row',s:'4×10',m:'Eleiko free weight'},{n:'Shoulder press',s:'3×12',m:'Dumbbells'},{n:'Lat pulldown',s:'4×12',m:'Gym80 cable'},{n:'Bicep curl EZ',s:'3×12',m:'Free weight'},{n:'Tricep pushdown',s:'3×12',m:'Technogym cable'}],k:[{n:'Hip thrust',s:'4×12–15',m:'Bench + Eleiko bar'},{n:'Goblet squat',s:'3×15',m:'Nike kettlebell'},{n:'Hip abduction',s:'4×15–20',m:'Technogym machine'},{n:'Leg press 45°',s:'4×15',m:'Feet high — glute focus'},{n:'Crunch machine',s:'3×15',m:'Technogym / Gym80'},{n:'Hip adduction',s:'3×20',m:'Technogym machine'}]},1:{t:'Monday — Jose cardio / Kely strength',j:[{n:'Warmup',s:'10 min · HR 100–110',m:'Treadmill'},{n:'Bike or elliptical',s:'35 min · HR 130–145',m:'Technogym cardio'},{n:'Cooldown + stretch',s:'10 min',m:'Stretching area'}],k:[{n:'Lunges + dumbbells',s:'3×12 each leg',m:'Free weight zone'},{n:'Step-up + dumbbell',s:'3×12 each leg',m:'Bench + kettlebell'},{n:'Abduction + adduction',s:'3×20 (superset)',m:'Technogym machines'},{n:'Hip thrust',s:'3×15',m:'Bench + Eleiko bar'}]},2:{t:'Tuesday — Strength both',j:[{n:'Bench press',s:'4×10–12',m:'Hammer Strength'},{n:'Barbell row',s:'4×10',m:'Eleiko'},{n:'Shoulder press',s:'3×12',m:'Dumbbells'},{n:'Lat pulldown',s:'4×12',m:'Gym80'},{n:'Bicep curl',s:'3×12',m:'EZ bar'},{n:'Tricep pushdown',s:'3×12',m:'Cable'}],k:[{n:'Dumbbell chest press',s:'3×12–15',m:'Bench + dumbbells'},{n:'Seated cable row',s:'4×12',m:'Low cable Technogym'},{n:'Lateral raises',s:'3×15',m:'Dumbbells 5–8kg'},{n:'Lat pulldown',s:'3×12',m:'Gym80 cable'},{n:'Bench dips',s:'3×15',m:'Bench bodyweight'},{n:'Torso rotation',s:'3×15 each side',m:'Technogym machine'}]},3:{t:'Wednesday — Strength both',j:[{n:'Barbell squat',s:'4×8–10',m:'Squat rack Eleiko'},{n:'Romanian deadlift',s:'4×10',m:'Eleiko free weight'},{n:'Leg press 45°',s:'4×12',m:'Incline press'},{n:'Quad extension',s:'3×15',m:'Gym80 machine'},{n:'Hamstring curl',s:'3×15',m:'Gym80 machine'},{n:'Calf raises',s:'4×20',m:'Smith / calf machine'}],k:[{n:'Dumbbell chest press',s:'3×12–15',m:'Bench + dumbbells'},{n:'Seated cable row',s:'4×12',m:'Low cable'},{n:'Lateral raises',s:'3×15',m:'Dumbbells'},{n:'Lat pulldown',s:'3×12',m:'Gym80 cable'},{n:'Bench dips',s:'3×15',m:'Bench'},{n:'Torso rotation',s:'3×15 each',m:'Technogym machine'}]},4:{t:'Thursday — Rest day',j:[],k:[]},5:{t:'Friday — Full body + HIIT',j:[{n:'Thruster squat+press',s:'3×10',m:'Barbell or dumbbells'},{n:'Barbell row',s:'3×10',m:'Eleiko'},{n:'Assisted pull-ups',s:'3×max',m:'Hammer assisted'},{n:'HIIT sprints',s:'8×(20s sprint / 40s walk)',m:'Technogym treadmill 9–11 km/h'}],k:[{n:'Lunges + dumbbells',s:'3×12 each leg',m:'Free weight'},{n:'Step-up + dumbbell',s:'3×12 each leg',m:'Bench + kettlebell'},{n:'Abduction + adduction',s:'3×20',m:'Technogym'},{n:'Hip thrust',s:'3×15',m:'Eleiko bar'}]},6:{t:'Saturday — Together',j:[{n:'Upper body or full body',s:'4×10',m:'Based on week fatigue'},{n:'Core finisher',s:'3×15',m:'Cable / machine'}],k:[{n:'Glutes focus',s:'4×12–15',m:'Hip thrust + machines'},{n:'Crunch machine',s:'3×15',m:'Technogym'}]}};
var DAYS=['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];

function save(){localStorage.setItem('jk_v2',JSON.stringify(state))}
function today(){return new Date().toISOString().slice(0,10)}
function weekStart(){var d=new Date();d.setDate(d.getDate()-d.getDay());d.setHours(0,0,0,0);return d}
function dow(){return new Date().getDay()}

function setProfile(p){
  profile=p;
  var pj=document.getElementById('pbtn-j');
  var pk=document.getElementById('pbtn-k');
  pj.className='profile-btn'+(p==='j'?' active-j':'');
  pk.className='profile-btn'+(p==='k'?' active-k':'');
  var color=profiles[p].color;
  document.getElementById('gym-log-btn').style.background=color;
  document.getElementById('save-read-btn').style.background=color;
  renderAll();
}

function showScreen(s,el){
  document.querySelectorAll('.screen').forEach(function(x){x.classList.remove('active')});
  document.querySelectorAll('.nav-btn').forEach(function(x){x.classList.remove('active','active-k')});
  document.getElementById('s-'+s).classList.add('active');
  el.classList.add(profile==='k'?'active-k':'active');
  renderAll();
}

function renderAll(){
  setDateLabel();
  renderDashboard();
  renderToday();
  renderGym();
  renderReading();
}

function setDateLabel(){
  var d=new Date();
  document.getElementById('date-lbl').textContent=d.toLocaleDateString('en-GB',{weekday:'short',day:'numeric',month:'short'});
}

function renderDashboard(){
  var p=profiles[profile];
  var t=today();
  var ws=weekStart();
  var mData=state[profile].meals[t]||{};
  var doneMeals=MEALS.filter(function(m){return mData[m.id]}).length;
  var mPct=Math.round(doneMeals/MEALS.length*100);
  var weekGym=0;
  for(var i=0;i<7;i++){var d=new Date(ws);d.setDate(d.getDate()+i);if(state[profile].gym[d.toISOString().slice(0,10)])weekGym++;}
  var weekRead=0;
  for(var i=0;i<7;i++){var d=new Date(ws);d.setDate(d.getDate()+i);if(state[profile].reading[d.toISOString().slice(0,10)]>0)weekRead++;}
  var totalPages=0;
  for(var i=0;i<7;i++){var d=new Date(ws);d.setDate(d.getDate()+i);totalPages+=state[profile].reading[d.toISOString().slice(0,10)]||0;}
  var totalGym=Object.values(state[profile].gym).filter(Boolean).length;
  var streak=0;var check=new Date(t);
  while(true){var k=check.toISOString().slice(0,10);var md=state[profile].meals[k]||{};if(!Object.values(md).some(Boolean))break;streak++;check.setDate(check.getDate()-1);}

  document.getElementById('stat-grid').innerHTML=
    '<div class="stat stat-'+profile+'"><div class="stat-val">'+streak+'</div><div class="stat-lbl">day streak</div></div>'+
    '<div class="stat stat-'+profile+'"><div class="stat-val">'+totalGym+'</div><div class="stat-lbl">gym sessions</div></div>'+
    '<div class="stat stat-'+profile+'"><div class="stat-val">'+mPct+'%</div><div class="stat-lbl">meals on plan</div></div>'+
    '<div class="stat stat-'+profile+'"><div class="stat-val">'+totalPages+'</div><div class="stat-lbl">pages this week</div></div>';

  document.getElementById('dash-progress').innerHTML=
    prog('Gym days this week',weekGym,p.gymDays,p.color)+
    prog('Meals on plan today',doneMeals,MEALS.length,p.color)+
    prog('Reading days this week',weekRead,5,p.color);

  document.getElementById('weight-card').innerHTML=
    '<div class="weight-wrap">'+
    '<div class="w-block"><div class="w-label">Start</div><div class="w-value">'+p.current+' <span style="font-size:14px;color:#888">kg</span></div></div>'+
    '<div style="font-size:24px;color:#ccc">→</div>'+
    '<div class="w-block" style="text-align:right"><div class="w-label">Goal</div><div class="w-value w-value-'+profile+'">'+p.target+' <span style="font-size:14px;color:#888">kg</span></div></div>'+
    '</div>'+
    '<div style="margin-top:4px">'+
    '<div style="display:flex;justify-content:space-between;font-size:12px;color:#888;margin-bottom:5px"><span>To go</span><span>−'+(p.current-p.target).toFixed(1)+' kg</span></div>'+
    '<div class="prog-bar"><div class="prog-fill" style="width:0%;background:'+p.color+'"></div></div>'+
    '</div>';
}

function prog(label,val,max,color){
  var pct=Math.round(Math.min(100,val/max*100));
  return '<div class="prog-wrap"><div class="prog-lbl"><span>'+label+'</span><span>'+val+' / '+max+'</span></div>'+
    '<div class="prog-bar"><div class="prog-fill" style="width:'+pct+'%;background:'+color+'"></div></div></div>';
}

function renderToday(){
  var t=today();
  var mData=state[profile].meals[t]||{};
  var sData=state[profile].meals[t+'_s']||{};
  var p=profiles[profile];
  var mHtml='';
  MEALS.forEach(function(m){
    var done=mData[m.id];
    mHtml+='<div class="meal-row" onclick="toggleMeal(\''+m.id+'\')">';
    mHtml+='<div class="meal-check'+(done?' done-'+profile:'')+'">'+(done?'✓':'')+'</div>';
    mHtml+='<div class="meal-info"><div class="meal-name">'+m.name+'</div><div class="meal-desc">'+m.desc+'</div></div>';
    mHtml+='<div class="meal-time">'+m.time+'</div></div>';
  });
  document.getElementById('meal-list').innerHTML=mHtml;
  var done=MEALS.filter(function(m){return mData[m.id]}).length;
  var pct=Math.round(done/MEALS.length*100);
  document.getElementById('meal-pct').textContent=pct+'%';
  var bar=document.getElementById('meal-bar');
  bar.style.width=pct+'%';bar.style.background=p.color;

  var sHtml='';
  SUPPS.forEach(function(s){
    var d=sData[s.id];
    sHtml+='<div class="meal-row" onclick="toggleSupp(\''+s.id+'\')">';
    sHtml+='<div class="meal-check'+(d?' done-'+profile:'')+'">'+(d?'✓':'')+'</div>';
    sHtml+='<div class="meal-info"><div class="meal-name">'+s.name+'</div><div class="meal-desc">'+s.desc+'</div></div></div>';
  });
  document.getElementById('supp-list').innerHTML=sHtml;

  var wData=state[profile].water[t]||0;
  var goal=p.water;
  document.getElementById('water-count').textContent=wData+'/'+goal;
  var wHtml='';
  for(var i=0;i<goal;i++){
    wHtml+='<div class="water-glass'+(i<wData?' filled-'+profile:'')+'" onclick="tapWater('+i+')">💧</div>';
  }
  document.getElementById('water-grid').innerHTML=wHtml;
}

function toggleMeal(id){
  var t=today();
  if(!state[profile].meals[t])state[profile].meals[t]={};
  state[profile].meals[t][id]=!state[profile].meals[t][id];
  save();renderToday();renderDashboard();
}

function toggleSupp(id){
  var t=today();
  var k=t+'_s';
  if(!state[profile].meals[k])state[profile].meals[k]={};
  state[profile].meals[k][id]=!state[profile].meals[k][id];
  save();renderToday();
}

function tapWater(i){
  var t=today();
  var cur=state[profile].water[t]||0;
  state[profile].water[t]=i<cur?i:i+1;
  save();renderToday();
}

function renderGym(){
  var d=dow();
  var ws=weekStart();
  var strip='';
  for(var i=0;i<7;i++){
    var day=new Date(ws);day.setDate(day.getDate()+i);
    var k=day.toISOString().slice(0,10);
    var done=state[profile].gym[k];
    strip+='<div class="wday'+(i===d?' today':'')+(done?' done-'+profile:'')+'" onclick="selectDay('+i+')">';
    strip+='<div class="wday-name">'+DAYS[i]+'</div>';
    strip+='<div class="wday-num">'+day.getDate()+'</div>';
    strip+='<div class="wday-dot"></div></div>';
  }
  document.getElementById('week-strip').innerHTML=strip;
  showDayWorkout(d);

  var wkLog='';
  for(var i=0;i<7;i++){
    var day=new Date(ws);day.setDate(day.getDate()+i);
    var k=day.toISOString().slice(0,10);
    var wo=WO[i];
    var done=state[profile].gym[k];
    var isRest=wo&&wo[profile]&&wo[profile].length===0;
    var isToday=i===d;
    wkLog+='<div class="week-log-row"><span style="color:#888;font-size:12px">'+DAYS[i]+'</span>';
    wkLog+='<span style="font-size:12px;flex:1;margin:0 8px">'+(wo?wo.t.split('—')[1]||'':'')+'</span>';
    if(isRest)wkLog+='<span class="badge badge-rest">Rest</span>';
    else if(done)wkLog+='<span class="badge badge-done">✓ Done</span>';
    else if(isToday)wkLog+='<span class="badge badge-today">Today</span>';
    else wkLog+='<span class="badge-skip">—</span>';
    wkLog+='</div>';
  }
  document.getElementById('week-gym-log').innerHTML=wkLog;

  var t=today();
  var isDone=state[profile].gym[t];
  var btn=document.getElementById('gym-log-btn');
  btn.textContent=isDone?'✓ Session logged — tap to undo':'Mark session as done';
  btn.style.background=isDone?'#34c759':profiles[profile].color;
}

function showDayWorkout(i){
  var wo=WO[i]||WO[0];
  document.getElementById('gym-day-title').textContent=wo.t;
  var exList=wo[profile]||[];
  if(exList.length===0){
    document.getElementById('exercise-list').innerHTML='<div style="text-align:center;padding:20px;color:#bbb;font-size:13px">💤 Rest day — recover well</div>';
  } else {
    var h='';
    exList.forEach(function(ex){
      h+='<div class="ex-row"><div class="ex-name">'+ex.n+'</div>';
      h+='<div class="ex-meta"><span class="ex-sets">'+ex.s+'</span><span class="ex-machine">'+ex.m+'</span></div></div>';
    });
    document.getElementById('exercise-list').innerHTML=h;
  }
}

function selectDay(i){
  document.querySelectorAll('.wday').forEach(function(x,idx){
    x.classList.toggle('today',idx===i);
  });
  showDayWorkout(i);
}

function logGymDay(){
  var t=today();
  state[profile].gym[t]=!state[profile].gym[t];
  save();renderGym();renderDashboard();
}

function renderReading(){
  var t=today();
  var ws=weekStart();
  var p=profiles[profile];
  document.getElementById('book-input').value=state[profile].book||'';
  var pages=state[profile].reading[t]||0;
  document.getElementById('pages-input').value=pages>0?pages:0;
  var tog=document.getElementById('read-toggle');
  tog.className='ios-toggle'+(pages>0?' on-'+profile:'');

  var wkHtml='';var readDays=0;
  for(var i=0;i<7;i++){
    var d=new Date(ws);d.setDate(d.getDate()+i);
    var k=d.toISOString().slice(0,10);
    var pg=state[profile].reading[k]||0;
    if(pg>0)readDays++;
    wkHtml+='<div class="read-day-row"><span style="color:#888">'+DAYS[i]+' '+d.getDate()+'</span>';
    wkHtml+='<span style="font-weight:600;color:'+(pg>0?p.text:'#bbb')+'">'+(pg>0?pg+' pages':'—')+'</span></div>';
  }
  document.getElementById('reading-week').innerHTML=wkHtml;
  document.getElementById('read-days-lbl').textContent=readDays+' / 7';
  var bar=document.getElementById('read-bar');
  bar.style.width=Math.round(readDays/7*100)+'%';
  bar.style.background=p.color;
}

function toggleRead(){
  var t=today();
  var cur=state[profile].reading[t]||0;
  state[profile].reading[t]=cur>0?0:1;
  save();renderReading();renderDashboard();
}

function saveReading(){
  var t=today();
  var pages=parseInt(document.getElementById('pages-input').value)||0;
  state[profile].reading[t]=pages;
  save();renderReading();renderDashboard();
  var btn=document.getElementById('save-read-btn');
  btn.textContent='✓ Saved!';
  setTimeout(function(){btn.textContent='Save today';},1500);
}

function saveBook(){
  state[profile].book=document.getElementById('book-input').value;
  save();
}

renderAll();
</script>
</body>
</html>
